site:
  name: Rogério Pontes
  site: 'https://rogerioacp.github.io'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Rogério Pontes
    template: '%s — Rogério Pontes'
  description: "Security Engineering Manager with a Ph.D. in Computer Science, 9 peer-reviewed publications, and a track record of building security teams and cloud infrastructure at scale."
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Rogério Pontes
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@rogerio_acp'
    site: '@rogerio_acp'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

  tokens:
    default:
      fonts:
        sans: InterVariable
        serif: var(--ph-font-sans)
        heading: Plus Jakarta Sans Variable
      colors:
        default: rgb(51 65 85)
        heading: rgb(15 23 42)
        muted: rgb(100 116 139)
        bgPage: rgb(255 255 255)
        primary: rgb(79 70 229)
        secondary: rgb(67 56 202)
        accent: rgb(16 185 129)
        info: rgb(119 182 234)
        success: rgb(54 211 153)
        warning: rgb(251 189 35)
        error: rgb(248 114 114)
        link: var(--ph-color-primary)
        linkActive: var(--ph-color-link)
    dark:
      fonts: {}
      colors:
        default: rgb(203 213 225)
        heading: rgb(241 245 249)
        muted: rgb(148 163 184)
        bgPage: rgb(15 23 42)
        primary: rgb(129 140 248)
        secondary: rgb(99 102 241)
        accent: rgb(52 211 153)
        info: rgb(58 191 248)
        success: rgb(54 211 153)
        warning: rgb(251 189 35)
        error: rgb(248 114 114)
        link: var(--ph-color-primary)
        linkActive: var(--ph-color-link)
